<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXORA</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background-image:url('fondo.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */
header{
background:#111827;
color:white;
padding:25px;
text-align:center;
}

/* BOTONES CATEGORÍAS */
.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
background:#0f172a;
}

.menu button{
background:#2563eb;
color:white;
border:none;
padding:10px 12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* SECCIONES */
.section{
display:none;
padding:10px 0;
}

.section.active{
display:block;
}

.section-title{
text-align:center;
color:white;
margin:20px 0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:25px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:10px 14px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* CARRUSEL */
.slider{
position:relative;
}

.slider img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
display:none;
}

.slider img.active{
display:block;
}

.slider button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:6px 10px;
border-radius:50%;
cursor:pointer;
}

.prev{left:5px;}
.next{right:5px;}

</style>
</head>

<body>

<header>
<h1>🛍️ NEXORA</h1>
<p>Selecciona una categoría</p>
</header>

<!-- CATEGORÍAS -->
<div class="menu">
<button onclick="openCat('sudaderas')">Sudaderas</button>
<button onclick="openCat('camisas')">Camisas</button>
<button onclick="openCat('shorts')">Shorts</button>
<button onclick="openCat('perfumes')">Perfumes</button>
<button onclick="openCat('gorras')">Gorras</button>
<button onclick="openCat('tenis')">Tenis</button>
<button onclick="openCat('originales')">Perfumes Originales</button>
</div>

<!-- SUDADERAS -->
<div id="sudaderas" class="section active">
<h2 class="section-title">Sudaderas</h2>
<div class="grid">

<div class="card">
<div class="slider">
<button class="prev">◀</button>
<img class="active" src="producto1.png">
<img src="producto1b.png">
<img src="producto1c.png">
<button class="next">▶</button>
</div>
<h3>Sudadera 1</h3>
<p>$999</p>
<a class="btn pedir">Pedir</a>
</div>

</div>
</div>

<!-- CAMISAS -->
<div id="camisas" class="section">
<h2 class="section-title">Camisas</h2>
<div class="grid"></div>
</div>

<!-- SHORTS -->
<div id="shorts" class="section">
<h2 class="section-title">Shorts</h2>
<div class="grid"></div>
</div>

<!-- PERFUMES -->
<div id="perfumes" class="section">
<h2 class="section-title">Perfumes</h2>
<div class="grid"></div>
</div>

<!-- GORRAS -->
<div id="gorras" class="section">
<h2 class="section-title">Gorras</h2>
<div class="grid"></div>
</div>

<!-- TENIS -->
<div id="tenis" class="section">
<h2 class="section-title">Tenis</h2>
<div class="grid"></div>
</div>

<!-- ORIGINALES -->
<div id="originales" class="section">
<h2 class="section-title">Perfumes Originales</h2>
<div class="grid"></div>
</div>

<script>

/* CAMBIAR CATEGORÍA */
function openCat(id){
document.querySelectorAll('.section').forEach(s=>{
s.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}

/* WHATSAPP + CARRUSEL */
document.querySelectorAll(".card").forEach(card => {

const nombre = card.querySelector("h3").innerText;
const btn = card.querySelector(".pedir");

if(btn){
btn.addEventListener("click", () => {
const url = `https://wa.me/523329166067?text=${encodeURIComponent("Hola quiero el " + nombre)}`;
window.open(url, "_blank");
});
}

const slider = card.querySelector(".slider");
if(!slider) return;

const imgs = slider.querySelectorAll("img");
const prev = slider.querySelector(".prev");
const next = slider.querySelector(".next");

let index = 0;

function show(i){
imgs.forEach(img => img.classList.remove("active"));
imgs[i].classList.add("active");
}

next?.addEventListener("click", ()=> {
index = (index + 1) % imgs.length;
show(index);
});

prev?.addEventListener("click", ()=> {
index = (index - 1 + imgs.length) % imgs.length;
show(index);
});

show(index);
});

</script>

</body>
</html>
