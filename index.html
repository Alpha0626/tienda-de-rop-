<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXORA PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}

header{text-align:center;padding:20px;background:#111827;}

.menu{
display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
padding:10px;background:#0f172a;position:sticky;top:0;
}

.menu button{
background:#2563eb;border:none;color:white;
padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;
}

.section{display:none;padding:20px;}
.section.active{display:block;}

h2{text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;color:black;
border-radius:15px;padding:10px;
}

.slider{position:relative;}
.slider img{
width:100%;height:180px;object-fit:cover;
border-radius:10px;display:none;
}
.slider img.active{display:block;}

.slider button{
position:absolute;top:50%;transform:translateY(-50%);
border:none;background:black;color:white;
border-radius:50%;padding:6px;cursor:pointer;
}
.prev{left:5px;}
.next{right:5px;}

.btn{
display:block;text-align:center;
background:#25D366;color:white;
padding:10px;margin-top:10px;
border-radius:8px;text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>NEXORA 🛍️</h1>
</header>

<!-- MENÚ -->
<div class="menu">
<button onclick="openCat('sudaderas')">Sudaderas</button>
<button onclick="openCat('camisas')">Camisas</button>
<button onclick="openCat('shorts')">Shorts</button>
<button onclick="openCat('perfumes')">Perfumes</button>
<button onclick="openCat('gorras')">Gorras</button>
<button onclick="openCat('tenis')">Tenis</button>
<button onclick="openCat('originales')">Originales</button>
</div>

<script>
function openCat(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
window.scrollTo({top:0,behavior:"smooth"});
}
</script>

<!-- ================== DATOS (FÁCIL DE EDITAR) ================== -->

<script>
const data = {

{nombre:"Sudadera 3",precio:"$999 MXN",img:["s3-1.png","s3-2.png","s3-3.png"]},
{nombre:"Sudadera 4",precio:"$999 MXN",img:["s4-1.png","s4-2.png","s4-3.png"]},
{nombre:"Sudadera 5",precio:"$999 MXN",img:["s5-1.png","s5-2.png","s5-3.png"]},
{nombre:"Sudadera 6",precio:"$999 MXN",img:["s6-1.png","s6-2.png","s6-3.png"]},
{nombre:"Sudadera 7",precio:"$999 MXN",img:["s7-1.png","s7-2.png","s7-3.png"]},
{nombre:"Sudadera 8",precio:"$999 MXN",img:["s8-1.png","s8-2.png","s8-3.png"]},
{nombre:"Sudadera 9",precio:"$999 MXN",img:["s9-1.png","s9-2.png","s9-3.png"]},
{nombre:"Sudadera 10",precio:"$999 MXN",img:["s10-1.png","s10-2.png","s10-3.png"]},
],

camisas: [
{nombre:"Camisa 1",precio:"$799 MXN",img:["c1-1.png","c1-2.png","c1-3.png"]},
{nombre:"Camisa 2",precio:"$799 MXN",img:["c2-1.png","c2-2.png","c2-3.png"]},
{nombre:"Camisa 3",precio:"$799 MXN",img:["c3-1.png","c3-2.png","c3-3.png"]},
{nombre:"Camisa 4",precio:"$799 MXN",img:["c4-1.png","c4-2.png","c4-3.png"]},
{nombre:"Camisa 5",precio:"$799 MXN",img:["c5-1.png","c5-2.png","c5-3.png"]},
{nombre:"Camisa 6",precio:"$799 MXN",img:["c6-1.png","c6-2.png","c6-3.png"]},
{nombre:"Camisa 7",precio:"$799 MXN",img:["c7-1.png","c7-2.png","c7-3.png"]},

{nombre:"Camisa 10",precio:"$799 MXN",img:["c10-1.png","c10-2.png","c10-3.png"]},
],

shorts: [],
perfumes: [],
gorras: [],
tenis: [],
originales: []

};
</script>

<!-- ================== SECCIONES ================== -->

<div id="sudaderas" class="section active"><h2>Sudaderas</h2><div class="grid" id="sudaderasGrid"></div></div>
<div id="camisas" class="section"><h2>Camisas</h2><div class="grid" id="camisasGrid"></div></div>
<div id="shorts" class="section"><h2>Shorts</h2><div class="grid" id="shortsGrid"></div></div>
<div id="perfumes" class="section"><h2>Perfumes</h2><div class="grid" id="perfumesGrid"></div></div>
<div id="gorras" class="section"><h2>Gorras</h2><div class="grid" id="gorrasGrid"></div></div>
<div id="tenis" class="section"><h2>Tenis</h2><div class="grid" id="tenisGrid"></div></div>
<div id="originales" class="section"><h2>Originales</h2><div class="grid" id="originalesGrid"></div></div>

<script>
const cats = Object.keys(data);

cats.forEach(cat=>{
let grid = document.getElementById(cat+"Grid");
let html="";

data[cat].forEach(p=>{
html+=`
<div class="card">
  <div class="slider">
    <button class="prev">◀</button>
    <img class="active" src="${p.img[0]}">
    <img src="${p.img[1]}">
    <img src="${p.img[2]}">
    <button class="next">▶</button>
  </div>

  <h3>${p.nombre}</h3>
  <p>${p.precio}</p>
  <a class="btn pedir">Pedir</a>
</div>
`;
});

grid.innerHTML=html;
});

// WHATSAPP + CARRUSEL
document.addEventListener("click",e=>{

if(e.target.classList.contains("pedir")){
let name=e.target.closest(".card").querySelector("h3").innerText;
window.open("https://wa.me/523329166067?text="+encodeURIComponent("Quiero el "+name));
}

if(e.target.classList.contains("next")){
let s=e.target.closest(".slider");
let imgs=s.querySelectorAll("img");
let i=[...imgs].findIndex(x=>x.classList.contains("active"));
imgs[i].classList.remove("active");
imgs[(i+1)%imgs.length].classList.add("active");
}

if(e.target.classList.contains("prev")){
let s=e.target.closest(".slider");
let imgs=s.querySelectorAll("img");
let i=[...imgs].findIndex(x=>x.classList.contains("active"));
imgs[i].classList.remove("active");
imgs[(i-1+imgs.length)%imgs.length].classList.add("active");
}

});
</script>

</body>
</html>
