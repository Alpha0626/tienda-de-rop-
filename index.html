<style>
body{
font-family:Arial,sans-serif;
margin:0;
background-image:url('fondo.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
background:#111827;
color:white;
padding:30px;
text-align:center;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
background:#0f172a;
position:sticky;
top:0;
}

.menu button{
background:#2563eb;
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.section{
display:none;
padding:25px;
}

.section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.slider{
position:relative;
}

.slider img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
display:none;
cursor:zoom-in;
}

.slider img.active{
display:block;
}

.slider button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:5px; }
.next{ right:5px; }

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:10px 14px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

/* ZOOM */
#zoomBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
cursor:zoom-out;
}

#zoomBox img{
max-width:90%;
max-height:90%;
border-radius:10px;
box-shadow:0 0 25px rgba(255,255,255,0.25);
}
</style>
</head>

function openCat(id){

<div id="app"></div>

<script>
const app=document.getElementById("app");

function render(){
let html="";

for(let cat in data){
html+=`
<div id="${cat}" class="section">
<h2>${cat.toUpperCase()}</h2>
<div class="grid">
${data[cat].map(p=>`
<div class="card">
  <div class="slider">
    <button class="prev">◀</button>
    <img class="active" src="${p.img[0]}">
    <img src="${p.img[1]}">
    <img src="${p.img[2]}">
    <button class="next">▶</button>
  </div>

  <h3>${p.nombre}</h3>
  <p>${p.precio}</p>
  <a class="btn pedir">Pedir</a>
</div>
`).join("")}
</div>
</div>
`;
}

app.innerHTML=html;
}

render();

/* WHATSAPP + CARRUSEL */
document.addEventListener("click",e=>{

if(e.target.classList.contains("pedir")){
let name=e.target.closest(".card").querySelector("h3").innerText;

window.open("https://wa.me/523329166067?text="+encodeURIComponent(
"Hola me interesa el producto: " + name +
"\n¿Aún lo tienes disponible?"
));

}

if(e.target.classList.contains("next")){
let s=e.target.closest(".slider");
let imgs=s.querySelectorAll("img");
let i=[...imgs].findIndex(x=>x.classList.contains("active"));
imgs[i].classList.remove("active");
imgs[(i+1)%imgs.length].classList.add("active");
}

if(e.target.classList.contains("prev")){
let s=e.target.closest(".slider");
let imgs=s.querySelectorAll("img");
let i=[...imgs].findIndex(x=>x.classList.contains("active"));
imgs[i].classList.remove("active");
imgs[(i-1+imgs.length)%imgs.length].classList.add("active");
}

});

// ZOOM
const zoomBox=document.createElement("div");
zoomBox.id="zoomBox";
zoomBox.innerHTML=`<img>`;
document.body.appendChild(zoomBox);

const zoomImg=zoomBox.querySelector("img");

document.addEventListener("click",e=>{
if(e.target.tagName==="IMG" && e.target.closest(".slider")){
zoomImg.src=e.target.src;
zoomBox.style.display="flex";
}
if(e.target.id==="zoomBox"){
zoomBox.style.display="none";
}
});
</script>
